services:

  db:
    image: mysql:8.0
    container_name: fluig-db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    command:
      - --default-authentication-plugin=mysql_native_password
      - --lower-case-table-names=1
      - --character-set-server=utf8
      - --collation-server=utf8_general_ci
    ports:
      - "${PORT_DB:-3306}:3306"
    volumes:
      - fluig-db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - fluig-net

  mailpit:
    image: axllent/mailpit
    container_name: fluig-mail
    restart: unless-stopped
    profiles:
      - mail
    ports:
      - "${EMAIL_PORT:-1025}:1025"
      - "${PORT_MAIL_UI:-8025}:8025"
    networks:
      - fluig-net

  fluig:
    build: .
    container_name: fluig
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${PORT_APP:-8080}:8080"
      - "${PORT_SSL:-8443}:8443"
      - "${PORT_SOLR:-8983}:8983"
      - "${PORT_REALTIME:-8888}:8888"
      - "${PORT_CHAT:-7070}:7070"
    volumes:
      - fluig-app-data:${FLUIG_INSTALL_PATH:-/opt/totvs/fluig}
      - ./installer-package:/installer/package:ro
      - ./scripts:/installer/scripts:ro
    networks:
      - fluig-net

networks:
  fluig-net:

volumes:
  fluig-db-data:
  fluig-app-data:
